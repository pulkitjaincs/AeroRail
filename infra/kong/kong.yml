_format_version: "3.0"
_transform: true

services:
  # 1. Auth Service (Public paths)
  - name: auth-service
    url: http://host.docker.internal:3001
    routes:
      - name: auth-route
        paths:
          - /auth

  # 2. Service Template (Protected paths for testing JWT)
  - name: service-template
    url: http://host.docker.internal:3000
    routes:
      - name: service-template-health
        paths:
          - /health
      - name: service-template-root
        paths:
          - /service-template
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp

consumers:
  # 3. Create consumer credentials matching our token issuer
  - username: aerorail-user
    jwt_secrets:
      - key: aerorail
        algorithm: RS256
        rsa_public_key: |
